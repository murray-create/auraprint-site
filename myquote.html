<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Quote | Aura Print &amp; Promo</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1a1a1a; --pink:#c026a3; --line:#e8e2da; --mut:#6b6560; --go:#15a34a; }
  *{box-sizing:border-box}
  body{margin:0;background:#efece6;font-family:Inter,system-ui,sans-serif;color:var(--ink);font-size:14px;line-height:1.45}
  .page{max-width:820px;margin:24px auto;background:#fff;padding:48px 52px;box-shadow:0 2px 14px rgba(0,0,0,.08)}
  .muted{color:var(--mut)}
  .lbl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:3px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
  h1{font-family:'Archivo Black',sans-serif;font-size:38px;margin:0 0 26px;letter-spacing:-.01em}
  .brand{font-family:'Archivo Black',sans-serif;font-size:19px;text-align:right;line-height:1.1}
  .brand span{color:var(--pink)}
  .meta{display:flex;gap:44px;flex-wrap:wrap;margin-bottom:30px}
  .meta .v{font-weight:700;font-size:15px}
  .seller{text-align:right;font-size:13px;color:#444}
  .billing{display:flex;gap:36px;flex-wrap:wrap;align-items:flex-start;border-top:1px solid var(--line);padding-top:24px;margin-bottom:30px}
  .billing .col{flex:1;min-width:170px}
  .total{font-family:'Archivo Black',sans-serif;font-size:32px;margin:2px 0 10px}
  .validbox{display:inline-block;background:#fdf0d5;border:1px solid #f3d9a4;border-radius:6px;padding:7px 12px;font-size:13px;margin-bottom:12px}
  .flag{display:inline-block;border-radius:6px;padding:7px 12px;font-size:13px;font-weight:700;margin-bottom:12px}
  .flag.ok{background:#dcfce7;border:1px solid #a7e3bd;color:#15803d}
  .flag.no{background:#fee2e2;border:1px solid #f1b6b6;color:#b91c1c}
  .flag.exp{background:#fef3c7;border:1px solid #f3d9a4;color:#b45309}
  table{width:100%;border-collapse:collapse;margin:6px 0 0}
  thead th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#4c4670;text-align:right;padding:10px 8px;border-top:3px solid #4c4670;border-bottom:2px solid #4c4670}
  thead th:first-child{text-align:left}
  tbody td{padding:13px 8px;border-bottom:1px solid var(--line);vertical-align:top;text-align:right;font-size:13.5px}
  tbody td:first-child{text-align:left;white-space:pre-line}
  .totals td{border:none;padding:6px 8px;font-size:14px}
  .totals tr:last-child td{font-weight:900;font-size:16px;border-top:3px solid #4c4670;padding-top:12px}
  .notes{margin-top:22px;background:#faf7f2;border-radius:10px;padding:16px 18px;font-size:13.5px;white-space:pre-line}
  .decide{margin-top:30px;border-top:1px solid var(--line);padding-top:24px}
  .decide h2{font-size:17px;margin:0 0 6px}
  .decide .field{margin:12px 0}
  .decide label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin-bottom:5px}
  .decide input,.decide textarea{width:100%;max-width:420px;padding:11px;border:2px solid var(--line);border-radius:9px;font-size:14.5px;font-family:inherit}
  .decide textarea{max-width:560px;min-height:70px}
  .btnrow{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
  .acceptbtn{background:var(--go);color:#fff;font-weight:800;font-size:15px;padding:13px 28px;border-radius:8px;border:none;cursor:pointer}
  .declinebtn{background:#efe9e1;color:#6b6560;font-weight:700;font-size:14px;padding:13px 22px;border-radius:8px;border:none;cursor:pointer}
  .msg{margin-top:12px;font-size:14px}
  .msg.err{color:#b91c1c}
  .msg.ok{color:#15803d}
  .footer{margin-top:34px;font-size:11.5px;color:var(--mut);border-top:1px solid var(--line);padding-top:12px}
  .toolbar{max-width:820px;margin:14px auto 0;display:flex;gap:10px;justify-content:flex-end;padding:0 4px}
  .toolbar button{padding:9px 18px;border-radius:8px;border:none;font-weight:700;cursor:pointer;background:var(--ink);color:#fff}
  .errpage{max-width:820px;margin:60px auto;background:#fff;padding:40px;text-align:center;border-radius:12px}
  @media print{
    body{background:#fff}
    .page{box-shadow:none;margin:0;max-width:none;padding:20px 30px}
    .toolbar,.decide{display:none}
  }
</style>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
<div class="toolbar" id="toolbar" style="display:none"><button onclick="window.print()">🖨 Print / Save as PDF</button></div>
<div id="doc"></div>

<script src="assets/config.js?v=20260716a"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var CFG = window.AURA_CONFIG || {};
  var BIZ = CFG.business || {};
  var sb = supabase.createClient(CFG.supabaseUrl, CFG.supabaseKey);
  var t = (new URLSearchParams(location.search).get('t')||'').trim();

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function money(c){ return '$' + (c/100).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtDate(s){ var d=new Date(s); return d.toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}); }
  function fmtDay(s){ var d=new Date(s+'T00:00:00'); return d.toLocaleDateString('en-AU',{day:'2-digit',month:'long',year:'numeric'}); }
  function fail(msg){ document.getElementById('doc').innerHTML = '<div class="errpage"><h2>Quote unavailable</h2><p class="muted">'+msg+'</p><p class="muted">Need help? Email admin@auraprint.com.au</p></div>'; }

  if (!/^[0-9a-f-]{36}$/i.test(t)){ fail('This quote link looks incomplete — please use the full link from your email.'); return; }

  function load(){
    sb.rpc('get_quote_by_token', { p_token: t }).then(function(res){
      if (res.error){ fail(esc(res.error.message)); return; }
      var q = res.data;
      if (!q){ fail('We couldn\'t find a quote for this link. Contact us and we\'ll sort it out.'); return; }
      render(q);
    });
  }
  load();

  function statusFlag(q){
    if (q.status==='accepted') return '<div class="flag ok">ACCEPTED'+(q.decided_at?' — '+esc(fmtDate(q.decided_at)):'')+(q.accepted_by_name?' by '+esc(q.accepted_by_name):'')+'</div>';
    if (q.status==='converted') return '<div class="flag ok">ACCEPTED — your order is underway, tax invoice to follow</div>';
    if (q.status==='declined') return '<div class="flag no">DECLINED'+(q.decided_at?' — '+esc(fmtDate(q.decided_at)):'')+'</div>';
    if (q.is_expired) return '<div class="flag exp">EXPIRED '+esc(fmtDay(q.valid_until))+' — contact us for an updated price</div>';
    return '<div class="validbox">Valid until <b>'+esc(fmtDay(q.valid_until))+'</b></div>';
  }

  function render(q){
    var itemsHtml = (q.items||[]).map(function(i){
      var unitEx = i.qty ? i.price_ex_cents / i.qty : i.price_ex_cents;
      return '<tr><td>'+esc(i.description)+'</td>'+
        '<td>'+i.qty+'</td>'+
        '<td>'+money(unitEx)+'</td>'+
        '<td>10.00%</td>'+
        '<td>'+money(i.price_ex_cents)+'</td></tr>';
    }).join('');

    var canDecide = q.status==='sent' && !q.is_expired;

    var h = '<div class="page">'+
      '<div class="topbar"><h1>Quote</h1>'+
      '<div><div class="brand">AURA <span>PRINT</span><br>&amp; PROMO</div></div></div>'+

      '<div class="topbar" style="margin-bottom:26px">'+
      '<div class="meta">'+
        '<div><div class="lbl">Quote number</div><div class="v">'+esc(q.quote_number)+'</div>'+
        '<div class="lbl" style="margin-top:14px">Quote date</div><div class="v">'+esc(fmtDate(q.sent_at||q.created_at))+'</div></div>'+
        '<div><div class="lbl">Valid until</div><div class="v">'+esc(fmtDay(q.valid_until))+'</div></div>'+
      '</div>'+
      '<div class="seller"><b>'+esc(BIZ.name||'Aura Print')+'</b><br>'+
        esc(BIZ.address1||'4/1 Packer Road')+'<br>'+esc(BIZ.address2||'Baringa QLD 4551')+'<br>'+
        'Phone: '+esc(BIZ.phone||'0404 601 314')+'<br>'+
        'Email: '+esc(BIZ.email||'admin@auraprint.com.au')+'<br>'+
        'ABN: '+esc(BIZ.abn||'75 642 501 493')+'</div>'+
      '</div>'+

      '<div class="billing">'+
      '<div class="col"><div class="lbl">Prepared for</div>'+
        '<b>'+esc(q.company||q.contact_name)+'</b><br>'+
        (q.company?esc(q.contact_name)+'<br>':'')+
        esc(q.contact_email)+'</div>'+
      '<div class="col"><div class="lbl">Total (inc GST)</div><div class="total">'+money(q.total_inc_cents)+'</div>'+statusFlag(q)+'</div>'+
      '</div>'+

      '<table><thead><tr><th>Description</th><th>Quantity</th><th>Unit price (ex)</th><th>GST</th><th>Amount (ex)</th></tr></thead>'+
      '<tbody>'+itemsHtml+'</tbody></table>'+
      '<table class="totals"><tr><td style="width:70%"></td><td><b>Subtotal</b></td><td style="text-align:right">'+money(q.subtotal_ex_cents)+'</td></tr>'+
      '<tr><td></td><td><b>Total GST</b></td><td style="text-align:right">'+money(q.gst_cents)+'</td></tr>'+
      '<tr><td></td><td>Total</td><td style="text-align:right">'+money(q.total_inc_cents)+'</td></tr></table>'+

      (q.customer_notes?'<div class="notes"><div class="lbl" style="margin-bottom:6px">Notes</div>'+esc(q.customer_notes)+'</div>':'');

    if (canDecide){
      h += '<div class="decide" id="decide">'+
        '<h2>Happy with this quote?</h2>'+
        '<p class="muted" style="margin:4px 0 0">Accept below and we\'ll email your tax invoice. Nothing goes to print until you\'ve paid and approved your artwork proof. Forwarded this by a colleague? That\'s fine — just enter your own name.</p>'+
        '<div class="field"><label>Your name *</label><input id="dName" placeholder="Full name"></div>'+
        '<div class="field"><label>Comments (required if declining)</label><textarea id="dComments" placeholder="Optional — anything we should know?"></textarea></div>'+
        '<div class="btnrow">'+
          '<button class="acceptbtn" id="dAccept">✓ Accept quote</button>'+
          '<button class="declinebtn" id="dDecline">Decline</button>'+
        '</div>'+
        '<div class="msg" id="dMsg"></div>'+
        '</div>';
    } else if (q.status==='declined'){
      h += '<div class="decide"><p class="muted">You declined this quote'+(q.decision_comments?' — “'+esc(q.decision_comments)+'”':'')+'. Changed your mind or want it revised? Email '+esc(BIZ.email||'admin@auraprint.com.au')+' and we\'ll take care of it.</p></div>';
    } else if (q.is_expired){
      h += '<div class="decide"><p class="muted">This quote has expired. Email '+esc(BIZ.email||'admin@auraprint.com.au')+' or call '+esc(BIZ.phone||'0404 601 314')+' for an updated price — it only takes a minute.</p></div>';
    }

    h += '<div class="footer">ABN: '+esc(BIZ.abn||'75 642 501 493')+' · '+esc(BIZ.name||'Aura Print')+' · '+esc(BIZ.address1||'4/1 Packer Road')+', '+esc(BIZ.address2||'Baringa QLD 4551')+' · Prices in AUD and include GST where shown. This is a quotation, not a tax invoice. Price valid until '+esc(fmtDay(q.valid_until))+'.</div>'+
      '</div>';

    document.getElementById('doc').innerHTML = h;
    document.getElementById('toolbar').style.display = 'flex';
    document.title = 'Quote '+q.quote_number+' | Aura Print & Promo';

    if (canDecide){
      document.getElementById('dAccept').addEventListener('click', function(){ decide('accepted', this); });
      document.getElementById('dDecline').addEventListener('click', function(){ decide('declined', this); });
    }
  }

  function decide(decision, btn){
    var name = document.getElementById('dName').value.trim();
    var comments = document.getElementById('dComments').value.trim();
    var msg = document.getElementById('dMsg');
    msg.className = 'msg';
    if (!name){ msg.className = 'msg err'; msg.textContent = 'Please enter your name first.'; return; }
    if (decision==='declined' && !comments){ msg.className = 'msg err'; msg.textContent = 'Please tell us why you\'re declining so we can help.'; return; }
    if (decision==='declined' && !confirm('Decline this quote?')) return;
    btn.disabled = true; msg.textContent = 'Sending…';
    sb.rpc('decide_quote', { p_token: t, p_decision: decision, p_name: name, p_comments: comments||null })
      .then(function(res){
        if (res.error){ msg.className = 'msg err'; msg.textContent = res.error.message; btn.disabled = false; return; }
        msg.className = 'msg ok';
        msg.textContent = decision==='accepted'
          ? 'Thank you — quote accepted! We\'ll email your tax invoice shortly.'
          : 'Thanks for letting us know.';
        setTimeout(load, 1200);
      });
  }
})();
</script>
</body>
</html>

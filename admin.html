<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Aura Print CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/aura.css?v=20260711a">
<style>
  body{background:#f6f3ee}
  .admin-wrap{max-width:1200px;margin:0 auto;padding:28px 20px}
  .admin-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
  .admin-head h1{font-size:26px;margin:0}
  .muted{color:#8a847d;font-size:13px}
  .login{max-width:380px;margin:8vh auto;background:#fff;border:1px solid #e8e2da;border-radius:16px;padding:30px}
  .login h1{font-size:22px;margin:0 0 6px}
  .login .field{margin:14px 0}
  .login label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:6px}
  .login input{width:100%;padding:12px;border:2px solid #e8e2da;border-radius:10px;font-size:15px}
  .btn-sm{padding:9px 16px;border-radius:9px;font-weight:700;font-size:13px;border:none;cursor:pointer}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{padding:7px 14px;border-radius:999px;font-weight:700;font-size:13px;border:2px solid #e0d9d0;background:#fff;cursor:pointer;color:#555}
  .chip.active{background:var(--ink,#1a1a1a);color:#fff;border-color:transparent}
  .tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:2px solid #e8e2da;padding-bottom:0}
  .tab{padding:10px 20px;font-weight:800;font-size:14px;border:none;background:none;cursor:pointer;color:#8a847d;border-bottom:3px solid transparent;margin-bottom:-2px}
  .tab.active{color:#1a1a1a;border-bottom-color:#c026a3}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 0 #e8e2da}
  th,td{text-align:left;padding:12px 14px;font-size:13.5px;vertical-align:top;border-bottom:1px solid #f0ece5}
  th{background:#faf7f2;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8a847d}
  tr:last-child td{border-bottom:none}
  .lead-name{font-weight:700}
  .lead-contact a{color:#c026a3;text-decoration:none}
  .job{max-width:320px;white-space:pre-wrap;color:#555}
  .status-sel{padding:6px 8px;border-radius:8px;border:2px solid #e0d9d0;font-weight:700;font-size:12.5px;background:#fff}
  .s-new{color:#b45309}.s-contacted{color:#2563eb}.s-quoted{color:#7c3aed}.s-won{color:#15803d}.s-lost{color:#9ca3af}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:#f0ece5;color:#6b6560}
  .pill.p-sent{background:#ede9fe;color:#7c3aed}.pill.p-approved{background:#dcfce7;color:#15803d}
  .pill.p-declined,.pill.p-changes_requested{background:#fee2e2;color:#b91c1c}
  .pill.p-proofing,.pill.p-proof_sent{background:#ede9fe;color:#7c3aed}
  .pill.p-paid,.pill.p-invoiced{background:#dbeafe;color:#1d4ed8}
  .pill.p-awaiting_artwork{background:#fef3c7;color:#b45309}
  .pill.p-draft{background:#f0ece5;color:#6b6560}
  .pill.p-accepted{background:#dcfce7;color:#15803d}
  .pill.p-converted{background:#dbeafe;color:#1d4ed8}
  .pill.p-expired{background:#fef3c7;color:#b45309}
  .qline{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .qline input{padding:8px;border:2px solid #e8e2da;border-radius:8px;font-size:13.5px;font-family:inherit}
  .qline .q-desc{flex:3;min-width:220px}
  .qline .q-qty{width:70px}
  .qline .q-price{width:110px}
  .qline .q-del{background:#fee2e2;color:#b91c1c;border:none;border-radius:8px;padding:8px 10px;font-weight:800;cursor:pointer}
  .err{color:#c0392b;font-size:13.5px;margin-top:10px}
  .ok{color:#15803d;font-size:13.5px;margin-top:10px}
  .saved{color:#15803d;font-size:11px;margin-left:6px;opacity:0;transition:opacity .2s}
  .saved.show{opacity:1}
  .empty{text-align:center;color:#8a847d;padding:40px}
  .panel{background:#fff;border:1px solid #e8e2da;border-radius:14px;padding:22px;margin-bottom:18px}
  .panel h2{font-size:17px;margin:0 0 14px}
  .frow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .frow .f{flex:1;min-width:160px}
  .frow label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#8a847d;margin-bottom:4px}
  .frow input,.frow textarea{width:100%;padding:10px;border:2px solid #e8e2da;border-radius:9px;font-size:14px;font-family:inherit;box-sizing:border-box}
  .btn-aura2{background:#c026a3;color:#fff}
  .btn-ghost{background:#efe9e1;color:#555}
  .odetail{background:#faf7f2;border-radius:12px;padding:16px;margin-top:4px}
  .oitem{background:#fff;border:1px solid #e8e2da;border-radius:10px;padding:14px;margin-bottom:10px}
  .oitem-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .oitem-head b{font-size:14px}
  .proofrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;font-size:13px}
  .proofrow input[type=file]{font-size:12.5px}
  .events{font-size:12px;color:#8a847d;margin-top:10px;max-height:150px;overflow-y:auto}
  .events div{padding:2px 0;border-bottom:1px dashed #eee6dd}
  a.plink{color:#c026a3;font-weight:700;text-decoration:none}
</style>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>

<!-- LOGIN GATE -->
<div id="login" class="login" style="display:none">
  <h1>Aura CRM</h1>
  <p class="muted">Staff sign in to view enquiries.</p>
  <div class="field"><label>Email</label><input id="lEmail" type="email" autocomplete="username" placeholder="admin@auraprint.com.au"></div>
  <div class="field"><label>Password</label><input id="lPass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
  <div class="h-captcha" data-sitekey="a64203e6-71d8-4a74-ac74-70ea716c306a" style="margin-bottom:14px"></div>
  <button id="lBtn" class="btn btn-aura" style="width:100%">Sign in</button>
  <div id="lErr" class="err"></div>
</div>

<!-- APP -->
<div id="app" class="admin-wrap" style="display:none">
  <div class="admin-head">
    <div>
      <h1 id="pageTitle">Aura CRM</h1>
      <div class="muted" id="count">Loading…</div>
    </div>
    <div>
      <button id="refreshBtn" class="chip">↻ Refresh</button>
      <button id="signout" class="btn-sm btn-ghost">Sign out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="leads">Lead Inbox</button>
    <button class="tab" data-tab="quotes">Quotes</button>
    <button class="tab" data-tab="orders">Orders &amp; Proofs</button>
  </div>

  <!-- LEADS TAB -->
  <div id="tab-leads">
    <div class="filters" id="filters">
      <button class="chip active" data-f="all">All</button>
      <button class="chip" data-f="new">New</button>
      <button class="chip" data-f="contacted">Contacted</button>
      <button class="chip" data-f="quoted">Quoted</button>
      <button class="chip" data-f="won">Won</button>
      <button class="chip" data-f="lost">Lost</button>
    </div>
    <div id="tableWrap"></div>
  </div>

  <!-- QUOTES TAB -->
  <div id="tab-quotes" style="display:none">
    <div class="panel" id="newQuotePanel">
      <h2>New quote</h2>
      <div class="frow">
        <div class="f"><label>Contact name *</label><input id="qName"></div>
        <div class="f"><label>Email *</label><input id="qEmail" type="email"></div>
        <div class="f"><label>Phone</label><input id="qPhone"></div>
        <div class="f"><label>Company</label><input id="qCompany"></div>
      </div>
      <div style="margin-bottom:6px"><label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#8a847d">Line items *</label></div>
      <div id="qLines"></div>
      <button id="qAddLine" class="btn-sm btn-ghost" style="margin-bottom:12px">+ Add line</button>
      <div class="frow">
        <div class="f" style="flex:3"><label>Notes shown on quote</label><input id="qNotes" placeholder="e.g. Price includes delivery to Baringa. Turnaround 5–7 business days after proof approval."></div>
        <div class="f"><label>Valid until</label><input id="qValid" type="date"></div>
      </div>
      <button id="qCreate" class="btn-sm btn-aura2">Create quote</button>
      <span id="qMsg" class="muted" style="margin-left:10px"></span>
    </div>
    <div id="quotesWrap"></div>
  </div>

  <!-- ORDERS TAB -->
  <div id="tab-orders" style="display:none">
    <div class="panel" id="newOrderPanel">
      <h2>New order</h2>
      <div class="frow">
        <div class="f"><label>Contact name *</label><input id="oName"></div>
        <div class="f"><label>Email *</label><input id="oEmail" type="email"></div>
        <div class="f"><label>Phone</label><input id="oPhone"></div>
        <div class="f"><label>Company</label><input id="oCompany"></div>
      </div>
      <div class="frow">
        <div class="f" style="flex:2"><label>Item description *</label><input id="oDesc" placeholder="e.g. Business Cards 450gsm Velvet, 90x55, 2 sides"></div>
        <div class="f"><label>Product slug</label><input id="oSlug" placeholder="custom"></div>
        <div class="f"><label>Qty *</label><input id="oQty" type="number" min="1" value="1"></div>
        <div class="f"><label>Price inc GST ($) *</label><input id="oPrice" type="number" min="0" step="0.01"></div>
      </div>
      <div class="frow"><div class="f"><label>Order notes</label><input id="oNotes"></div></div>
      <button id="oCreate" class="btn-sm btn-aura2">Create order</button>
      <span id="oMsg" class="muted" style="margin-left:10px"></span>
    </div>
    <div id="ordersWrap"></div>
  </div>
</div>

<script src="assets/config.js?v=20260711a"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
<script>
(function(){
  var CFG = window.AURA_CONFIG || {};
  var loginEl = document.getElementById('login'), appEl = document.getElementById('app');
  if (!CFG.supabaseUrl || !CFG.supabaseKey){
    loginEl.style.display='block';
    document.getElementById('lErr').textContent = 'Database not configured (missing Supabase settings).';
    return;
  }
  var sb = supabase.createClient(CFG.supabaseUrl, CFG.supabaseKey);
  var STATUSES = ['new','contacted','quoted','won','lost'];
  var currentFilter = 'all', allLeads = [], allOrders = [], openOrder = null;
  var allQuotes = [], openQuote = null, quoteLeadId = null;
  var PROOF_BASE = location.origin + location.pathname.replace(/admin\.html$/,'') + 'proof.html';
  var QUOTE_BASE = PROOF_BASE.replace(/proof\.html$/,'myquote.html');

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function fmtDate(s){ var d=new Date(s); return d.toLocaleDateString('en-AU',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}); }
  function money(c){ return '$'+(c/100).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  async function showApp(){
    loginEl.style.display='none'; appEl.style.display='block';
    await loadLeads();
  }
  function showLogin(){ appEl.style.display='none'; loginEl.style.display='block'; }

  /* ============ TABS ============ */
  var activeTab = 'leads';
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click', function(){
      activeTab = t.dataset.tab;
      document.querySelectorAll('.tab').forEach(function(x){ x.classList.toggle('active', x===t); });
      ['leads','quotes','orders'].forEach(function(k){
        document.getElementById('tab-'+k).style.display = activeTab===k?'':'none';
      });
      if (activeTab==='orders') loadOrders(); else if (activeTab==='quotes') loadQuotes(); else loadLeads();
    });
  });
  document.getElementById('refreshBtn').addEventListener('click', function(){
    if (activeTab==='orders') loadOrders(); else if (activeTab==='quotes') loadQuotes(); else loadLeads();
  });

  /* ============ LEADS (unchanged) ============ */
  async function loadLeads(){
    document.getElementById('count').textContent = 'Loading…';
    var res = await sb.from('leads').select('*').order('created_at',{ascending:false});
    if (res.error){ document.getElementById('tableWrap').innerHTML = '<div class="empty">Could not load leads: '+esc(res.error.message)+'</div>'; return; }
    allLeads = res.data || [];
    render();
  }

  function render(){
    var rows = allLeads.filter(function(l){ return currentFilter==='all' || l.status===currentFilter; });
    var newCount = allLeads.filter(function(l){return l.status==='new';}).length;
    document.getElementById('count').textContent = allLeads.length+' leads · '+newCount+' new';
    if (!rows.length){ document.getElementById('tableWrap').innerHTML = '<div class="empty">No leads'+(currentFilter==='all'?' yet.':' in this view.')+'</div>'; return; }
    var html = '<table><thead><tr>'+
      '<th>Received</th><th>Contact</th><th>Category</th><th>Qty</th><th>Job</th><th>Source</th><th>Status</th>'+
      '</tr></thead><tbody>';
    rows.forEach(function(l){
      var art = '';
      if (l.artwork_link) {
        art = /^https?:\/\//i.test(String(l.artwork_link).trim())
          ? '<div><a href="'+esc(l.artwork_link)+'" target="_blank" rel="noopener noreferrer">artwork ↗</a></div>'
          : '<div style="color:#8a847d">artwork link (unsafe scheme, not clickable): '+esc(l.artwork_link)+'</div>';
      }
      html += '<tr>'+
        '<td>'+esc(fmtDate(l.created_at))+'</td>'+
        '<td><div class="lead-name">'+esc(l.name)+'</div>'+
          '<div class="lead-contact"><a href="mailto:'+esc(l.email)+'">'+esc(l.email)+'</a></div>'+
          (l.phone?'<div class="muted">'+esc(l.phone)+'</div>':'')+
          (l.company?'<div class="muted">'+esc(l.company)+'</div>':'')+'</td>'+
        '<td>'+esc(l.category||'—')+'</td>'+
        '<td>'+esc(l.quantity||'—')+'</td>'+
        '<td><div class="job">'+esc(l.job_details||'—')+'</div>'+art+'</td>'+
        '<td><span class="pill">'+esc(l.source_form||'—')+'</span>'+(l.source_product_code?'<div class="muted">'+esc(l.source_product_code)+'</div>':'')+'</td>'+
        '<td>'+statusSelect(l)+'<span class="saved" id="saved-'+l.id+'">saved</span>'+
          '<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">'+
          (l.status!=='lost' && l.status!=='won' ? '<button class="btn-sm btn-ghost to-quote" data-id="'+l.id+'">→ quote</button>' : '')+
          (l.status==='won' ? '<button class="btn-sm btn-ghost to-order" data-id="'+l.id+'">→ order</button>' : '')+
          '</div>'+
        '</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('tableWrap').innerHTML = html;
    document.querySelectorAll('.status-sel').forEach(function(sel){
      sel.addEventListener('change', function(){ updateStatus(sel.dataset.id, sel.value); });
    });
    document.querySelectorAll('.to-order').forEach(function(b){
      b.addEventListener('click', function(){ leadToOrder(b.dataset.id); });
    });
    document.querySelectorAll('.to-quote').forEach(function(b){
      b.addEventListener('click', function(){ leadToQuote(b.dataset.id); });
    });
  }

  function leadToQuote(id){
    var l = allLeads.find(function(x){return x.id===id;}); if(!l) return;
    quoteLeadId = l.id;
    document.querySelector('.tab[data-tab=quotes]').click();
    document.getElementById('qName').value = l.name||'';
    document.getElementById('qEmail').value = l.email||'';
    document.getElementById('qPhone').value = l.phone||'';
    document.getElementById('qCompany').value = l.company||'';
    document.getElementById('qLines').innerHTML = '';
    var qty = (l.quantity && /^\d+$/.test(String(l.quantity))) ? parseInt(l.quantity,10) : 1;
    addQuoteLine((l.category?l.category+' — ':'')+(l.job_details||''), qty, '');
    document.getElementById('qMsg').textContent = 'Prefilled from lead: '+(l.name||'')+' — this quote will link back to the lead.';
    document.getElementById('newQuotePanel').scrollIntoView({behavior:'smooth'});
  }

  function leadToOrder(id){
    var l = allLeads.find(function(x){return x.id===id;}); if(!l) return;
    document.querySelector('.tab[data-tab=orders]').click();
    document.getElementById('oName').value = l.name||'';
    document.getElementById('oEmail').value = l.email||'';
    document.getElementById('oPhone').value = l.phone||'';
    document.getElementById('oCompany').value = l.company||'';
    document.getElementById('oDesc').value = (l.category?l.category+' — ':'')+(l.job_details||'');
    if (l.quantity && /^\d+$/.test(String(l.quantity))) document.getElementById('oQty').value = l.quantity;
    document.getElementById('newOrderPanel').scrollIntoView({behavior:'smooth'});
  }

  function statusSelect(l){
    var opts = STATUSES.map(function(s){ return '<option value="'+s+'"'+(l.status===s?' selected':'')+'>'+s+'</option>'; }).join('');
    return '<select class="status-sel s-'+esc(l.status)+'" data-id="'+l.id+'">'+opts+'</select>';
  }

  async function updateStatus(id, status){
    var res = await sb.from('leads').update({status:status}).eq('id', id);
    var badge = document.getElementById('saved-'+id);
    if (res.error){ alert('Could not update: '+res.error.message); return; }
    var l = allLeads.find(function(x){return x.id===id;}); if (l) l.status=status;
    if (badge){ badge.classList.add('show'); setTimeout(function(){ badge.classList.remove('show'); }, 1200); }
    document.getElementById('count').textContent = allLeads.length+' leads · '+allLeads.filter(function(x){return x.status==='new';}).length+' new';
    if (status==='won') render();
  }

  document.getElementById('filters').addEventListener('click', function(e){
    var b = e.target.closest('.chip'); if(!b) return;
    currentFilter = b.dataset.f;
    document.querySelectorAll('#filters .chip').forEach(function(c){ c.classList.toggle('active', c===b); });
    render();
  });

  /* ============ QUOTES ============ */
  function todayPlus(days){
    var d = new Date(); d.setDate(d.getDate()+days);
    return d.toISOString().slice(0,10);
  }
  function addQuoteLine(desc, qty, price){
    var row = document.createElement('div');
    row.className = 'qline';
    row.innerHTML =
      '<input class="q-desc" placeholder="Description e.g. Business Cards 450gsm Velvet, 90x55, 2 sides" value="'+esc(desc||'')+'">'+
      '<input class="q-qty" type="number" min="1" value="'+(qty||1)+'" title="Qty">'+
      '<input class="q-price" type="number" min="0" step="0.01" placeholder="$ inc GST" value="'+(price===''||price==null?'':price)+'" title="Line total inc GST">'+
      '<button class="q-del" title="Remove line">×</button>';
    row.querySelector('.q-del').addEventListener('click', function(){ row.remove(); });
    document.getElementById('qLines').appendChild(row);
  }
  function readQuoteLines(container){
    var lines = [];
    container.querySelectorAll('.qline').forEach(function(r){
      var desc = r.querySelector('.q-desc').value.trim();
      var qty = parseInt(r.querySelector('.q-qty').value,10);
      var price = Math.round(parseFloat(r.querySelector('.q-price').value||'0')*100);
      if (desc || price>0) lines.push({description:desc, qty:qty, price_inc_cents:price});
    });
    return lines;
  }
  document.getElementById('qAddLine').addEventListener('click', function(){ addQuoteLine('',1,''); });

  document.getElementById('qCreate').addEventListener('click', async function(){
    var m = document.getElementById('qMsg');
    var name = document.getElementById('qName').value.trim();
    var email = document.getElementById('qEmail').value.trim();
    var lines = readQuoteLines(document.getElementById('qLines'));
    if (!name || !email){ m.textContent = 'Fill in the contact name and email.'; return; }
    if (!lines.length){ m.textContent = 'Add at least one line item.'; return; }
    for (var i=0;i<lines.length;i++){
      if (!lines[i].description || !(lines[i].qty>0) || !(lines[i].price_inc_cents>=0) || isNaN(lines[i].price_inc_cents)){
        m.textContent = 'Line '+(i+1)+': needs a description, qty and price.'; return;
      }
    }
    this.disabled = true; m.textContent = 'Creating…';
    try {
      var q = await sb.from('quotes').insert({
        contact_name:name, contact_email:email,
        contact_phone:document.getElementById('qPhone').value.trim()||null,
        company:document.getElementById('qCompany').value.trim()||null,
        customer_notes:document.getElementById('qNotes').value.trim()||null,
        valid_until:document.getElementById('qValid').value||todayPlus(30),
        lead_id: quoteLeadId
      }).select('id,quote_number').single();
      if (q.error) throw q.error;
      var items = lines.map(function(l,ix){ return {quote_id:q.data.id, item_no:ix+1, description:l.description, qty:l.qty, price_inc_cents:l.price_inc_cents}; });
      var it = await sb.from('quote_items').insert(items);
      if (it.error) throw it.error;
      if (quoteLeadId){
        await sb.from('leads').update({status:'quoted'}).eq('id', quoteLeadId);
        var ld = allLeads.find(function(x){return x.id===quoteLeadId;}); if (ld) ld.status='quoted';
      }
      m.textContent = 'Created '+q.data.quote_number+' ✓ — now review and send it below.';
      ['qName','qEmail','qPhone','qCompany','qNotes','qValid'].forEach(function(id){ document.getElementById(id).value=''; });
      document.getElementById('qLines').innerHTML = ''; addQuoteLine('',1,'');
      quoteLeadId = null;
      openQuote = q.data.id;
      await loadQuotes();
    } catch(e){ m.textContent = 'Failed: '+(e.message||e); }
    this.disabled = false;
  });

  function quoteExpired(q){ return q.valid_until < new Date().toISOString().slice(0,10) && (q.status==='draft'||q.status==='sent'); }
  function quoteTotal(q){ return (q.quote_items||[]).reduce(function(s,i){return s+i.price_inc_cents;},0); }
  function quoteStatusPill(q){
    if (quoteExpired(q)) return '<span class="pill p-expired">expired</span>';
    return '<span class="pill p-'+esc(q.status)+'">'+esc(q.status)+'</span>';
  }

  async function loadQuotes(){
    document.getElementById('count').textContent = 'Loading…';
    if (!document.getElementById('qLines').children.length) addQuoteLine('',1,'');
    if (!document.getElementById('qValid').value) document.getElementById('qValid').value = todayPlus(30);
    var res = await sb.from('quotes')
      .select('*, quote_items(*), converted_order:orders!converted_order_id(order_number)')
      .order('created_at',{ascending:false});
    if (res.error){ document.getElementById('quotesWrap').innerHTML = '<div class="empty">Could not load quotes: '+esc(res.error.message)+'</div>'; return; }
    allQuotes = res.data || [];
    allQuotes.forEach(function(q){ (q.quote_items||[]).sort(function(a,b){return a.item_no-b.item_no;}); });
    var waiting = allQuotes.filter(function(q){ return q.status==='sent' && !quoteExpired(q); }).length;
    document.getElementById('count').textContent = allQuotes.length+' quotes'+(waiting?' · '+waiting+' awaiting reply':'');
    renderQuotes();
  }

  function renderQuotes(){
    if (!allQuotes.length){ document.getElementById('quotesWrap').innerHTML = '<div class="empty">No quotes yet. Create one above, or use “→ quote” on a lead.</div>'; return; }
    var html = '<table><thead><tr><th>Quote</th><th>Customer</th><th>Items</th><th>Total inc</th><th>Valid until</th><th>Status</th><th></th></tr></thead><tbody>';
    allQuotes.forEach(function(q){
      var items = (q.quote_items||[]).map(function(i){ return '<div>'+esc(i.description)+' ×'+i.qty+'</div>'; }).join('');
      html += '<tr>'+
        '<td><b>'+esc(q.quote_number||'')+'</b><div class="muted">'+esc(fmtDate(q.created_at))+'</div></td>'+
        '<td><div class="lead-name">'+esc(q.contact_name||'')+'</div><div class="lead-contact"><a href="mailto:'+esc(q.contact_email||'')+'">'+esc(q.contact_email||'')+'</a></div>'+(q.company?'<div class="muted">'+esc(q.company)+'</div>':'')+'</td>'+
        '<td>'+items+'</td>'+
        '<td><b>'+money(quoteTotal(q))+'</b></td>'+
        '<td>'+esc(new Date(q.valid_until+'T00:00:00').toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}))+'</td>'+
        '<td>'+quoteStatusPill(q)+'</td>'+
        '<td><button class="btn-sm btn-ghost q-open" data-id="'+q.id+'">'+(openQuote===q.id?'Close':'Manage')+'</button></td>'+
        '</tr>';
      if (openQuote===q.id){
        html += '<tr><td colspan="7"><div class="odetail">'+quoteDetail(q)+'</div></td></tr>';
      }
    });
    html += '</tbody></table>';
    document.getElementById('quotesWrap').innerHTML = html;
    document.querySelectorAll('.q-open').forEach(function(b){
      b.addEventListener('click', function(){ openQuote = (openQuote===b.dataset.id)?null:b.dataset.id; renderQuotes(); });
    });
    bindQuoteDetail();
  }

  function bindQuoteDetail(){
    document.querySelectorAll('.copy-link').forEach(function(b){
      b.addEventListener('click', function(){
        navigator.clipboard.writeText(b.dataset.link).then(function(){
          b.textContent = 'Copied ✓'; setTimeout(function(){ b.textContent='Copy link'; }, 1500);
        });
      });
    });
    document.querySelectorAll('.q-edit-add').forEach(function(b){
      b.addEventListener('click', function(){
        var wrap = document.getElementById('editLines-'+b.dataset.id);
        var row = document.createElement('div');
        row.className = 'qline';
        row.innerHTML = '<input class="q-desc" placeholder="Description"><input class="q-qty" type="number" min="1" value="1"><input class="q-price" type="number" min="0" step="0.01" placeholder="$ inc GST"><button class="q-del">×</button>';
        row.querySelector('.q-del').addEventListener('click', function(){ row.remove(); });
        wrap.appendChild(row);
      });
    });
    document.querySelectorAll('#quotesWrap .q-del').forEach(function(b){
      b.addEventListener('click', function(){ b.closest('.qline').remove(); });
    });
    document.querySelectorAll('.q-save').forEach(function(b){ b.addEventListener('click', function(){ saveQuoteEdits(b.dataset.id, b); }); });
    document.querySelectorAll('.q-send').forEach(function(b){ b.addEventListener('click', function(){ sendQuoteEmail(b.dataset.id, b); }); });
    document.querySelectorAll('.q-mark-sent').forEach(function(b){ b.addEventListener('click', function(){ markQuoteSent(b.dataset.id); }); });
    document.querySelectorAll('.q-accept-manual').forEach(function(b){ b.addEventListener('click', function(){ markQuoteAccepted(b.dataset.id); }); });
    document.querySelectorAll('.q-redraft').forEach(function(b){ b.addEventListener('click', function(){ revertQuoteToDraft(b.dataset.id); }); });
    document.querySelectorAll('.q-convert').forEach(function(b){ b.addEventListener('click', function(){ convertQuote(b.dataset.id, b); }); });
  }

  async function saveQuoteEdits(quoteId, btn){
    var msg = document.querySelector('.q-save-msg[data-id="'+quoteId+'"]');
    var lines = readQuoteLines(document.getElementById('editLines-'+quoteId));
    if (!lines.length){ msg.textContent = 'A quote needs at least one line item.'; return; }
    for (var i=0;i<lines.length;i++){
      if (!lines[i].description || !(lines[i].qty>0) || !(lines[i].price_inc_cents>=0) || isNaN(lines[i].price_inc_cents)){
        msg.textContent = 'Line '+(i+1)+': needs a description, qty and price.'; return;
      }
    }
    btn.disabled = true; msg.textContent = 'Saving…';
    try {
      var up = await sb.from('quotes').update({
        customer_notes: document.querySelector('.q-edit-notes[data-id="'+quoteId+'"]').value.trim()||null,
        valid_until: document.querySelector('.q-edit-valid[data-id="'+quoteId+'"]').value
      }).eq('id', quoteId);
      if (up.error) throw up.error;
      var del = await sb.from('quote_items').delete().eq('quote_id', quoteId);
      if (del.error) throw del.error;
      var items = lines.map(function(l,ix){ return {quote_id:quoteId, item_no:ix+1, description:l.description, qty:l.qty, price_inc_cents:l.price_inc_cents}; });
      var ins = await sb.from('quote_items').insert(items);
      if (ins.error) throw ins.error;
      await loadQuotes();
    } catch(e){ msg.textContent = 'Failed: '+(e.message||e); btn.disabled = false; }
  }

  function quoteEmailContent(q, link){
    var first = (q.contact_name||'').split(' ')[0] || 'there';
    var validStr = new Date(q.valid_until+'T00:00:00').toLocaleDateString('en-AU',{day:'2-digit',month:'long',year:'numeric'});
    var subj = 'Your quote '+(q.quote_number||'')+' — Aura Print & Promo';
    var body =
      'Hi '+first+',\n\n'+
      'Thanks for your enquiry — your quote is ready.\n\n'+
      'View quote '+(q.quote_number||'')+' online ('+money(quoteTotal(q))+' inc GST):\n'+link+'\n\n'+
      'If you\'re happy with everything, just click the green Accept button on the quote page and type your name — no sign-in needed, and you can forward this email to a colleague if someone else gives the go-ahead. Once accepted we\'ll send your tax invoice, and production starts as soon as payment lands and you\'ve approved your artwork proof.\n\n'+
      'This quote is valid until '+validStr+'. If anything needs adjusting — quantity, stock, finishing — just reply to this email and we\'ll update it for you.\n\n'+
      'Kind regards,\n'+
      'Murray\n'+
      'Aura Print & Promo\n'+
      'e: admin@auraprint.com.au\n'+
      'w: auraprint.com.au';
    return { subject: subj, body: body };
  }
  function quoteMailtoHref(q, link){
    var c = quoteEmailContent(q, link);
    return 'mailto:'+encodeURIComponent(q.contact_email||'')+'?subject='+encodeURIComponent(c.subject)+'&body='+encodeURIComponent(c.body);
  }

  async function sendQuoteEmail(quoteId, btn){
    var q = allQuotes.find(function(x){return x.id===quoteId;}); if(!q) return;
    var msg = document.querySelector('.q-send-msg[data-id="'+quoteId+'"]');
    var c = quoteEmailContent(q, QUOTE_BASE + '?t=' + q.access_token);
    if (!confirm('Send this quote to '+(q.contact_email||'')+' now?\n\nSubject: '+c.subject)) return;
    btn.disabled = true; if (msg) msg.textContent = 'Sending…';
    try {
      var s = await sb.auth.getSession();
      var r = await fetch(CFG.supabaseUrl+'/functions/v1/send-email', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+s.data.session.access_token },
        body: JSON.stringify({ to: q.contact_email, subject: c.subject, text: c.body })
      });
      var j = await r.json();
      if (!r.ok || !j.ok){ if (msg) msg.textContent = (j.error||('HTTP '+r.status)); btn.disabled=false; return; }
      await markQuoteSent(quoteId, true);
      if (msg) msg.textContent = 'Sent ✓';
    } catch(e){
      if (msg) msg.textContent = 'Failed: '+(e.message||e); btn.disabled = false;
    }
  }

  async function markQuoteSent(quoteId, skipReloadMsg){
    var q = allQuotes.find(function(x){return x.id===quoteId;}); if(!q) return;
    var patch = { sent_at: new Date().toISOString() };
    if (q.status==='draft') patch.status = 'sent';
    var res = await sb.from('quotes').update(patch).eq('id', quoteId);
    if (res.error){ alert('Could not mark as sent: '+res.error.message); return; }
    if (q.lead_id){ await sb.from('leads').update({status:'quoted'}).eq('id', q.lead_id).neq('status','won'); }
    await loadQuotes();
  }

  async function markQuoteAccepted(quoteId){
    var name = prompt('Who accepted the quote (name), and how? e.g. "Jane Smith — by phone"');
    if (!name || !name.trim()) return;
    var res = await sb.from('quotes').update({
      status:'accepted', decided_at:new Date().toISOString(),
      accepted_by_name:name.trim(), decision_comments:'Recorded by staff'
    }).eq('id', quoteId).eq('status','sent');
    if (res.error){ alert('Failed: '+res.error.message); return; }
    await loadQuotes();
  }

  async function revertQuoteToDraft(quoteId){
    if (!confirm('Move this quote back to draft so you can edit it? The customer link keeps working once you re-send.')) return;
    var res = await sb.from('quotes').update({
      status:'draft', decided_at:null, accepted_by_name:null, decision_comments:null
    }).eq('id', quoteId);
    if (res.error){ alert('Failed: '+res.error.message); return; }
    await loadQuotes();
  }

  async function convertQuote(quoteId, btn){
    var q = allQuotes.find(function(x){return x.id===quoteId;}); if(!q) return;
    var msg = document.querySelector('.q-convert-msg[data-id="'+quoteId+'"]');
    if (!confirm('Convert '+q.quote_number+' ('+money(quoteTotal(q))+' inc) into an order and tax invoice now?')) return;
    btn.disabled = true; if (msg) msg.textContent = 'Converting…';
    var res = await sb.rpc('convert_quote_to_order', { p_quote_id: quoteId });
    if (res.error){ if (msg) msg.textContent = 'Failed: '+res.error.message; btn.disabled = false; return; }
    var d = res.data || {};
    if (msg) msg.textContent = 'Created '+(d.order_number||'')+' + '+(d.invoice_number||'')+' ✓';
    await loadQuotes();
    /* jump straight to the new order so the invoice can be sent */
    openOrder = d.order_id || null;
    document.querySelector('.tab[data-tab=orders]').click();
  }

  /* ============ ORDERS & PROOFS ============ */
  async function loadOrders(){
    document.getElementById('count').textContent = 'Loading…';
    var res = await sb.from('orders')
      .select('*, order_items(*, proofs(id,version,status,sent_at,decided_at,decision_comments,approver_name,approval_token,file_id)), invoices(id,invoice_number,status,total_inc_cents,payment_link_url,access_token,paid_at), payments(id,amount_cents,status,provider,paid_at)')
      .order('created_at',{ascending:false});
    if (res.error){ document.getElementById('ordersWrap').innerHTML = '<div class="empty">Could not load orders: '+esc(res.error.message)+'</div>'; return; }
    allOrders = res.data || [];
    var nolink = allOrders.filter(function(o){ return (o.invoices||[]).some(function(v){ return !v.payment_link_url && v.status==='issued'; }); }).length;
    document.getElementById('count').textContent = allOrders.length+' orders'+(nolink?' · '+nolink+' awaiting payment link':'');
    renderOrders();
  }

  function latestProof(item){
    var ps = (item.proofs||[]).slice().sort(function(a,b){return b.version-a.version;});
    return ps[0] || null;
  }

  function renderOrders(){
    if (!allOrders.length){ document.getElementById('ordersWrap').innerHTML = '<div class="empty">No orders yet. Create one above, or convert a won lead.</div>'; return; }
    var html = '<table><thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Status</th><th></th></tr></thead><tbody>';
    allOrders.forEach(function(o){
      var items = (o.order_items||[]).map(function(i){
        var p = latestProof(i);
        return '<div>'+esc(i.description)+' ×'+i.qty+' <span class="pill p-'+esc(i.status)+'">'+esc(i.status.replace(/_/g,' '))+'</span>'+
          (p?' <span class="muted">proof v'+p.version+'</span>':'')+'</div>';
      }).join('');
      html += '<tr>'+
        '<td><b>'+esc(o.order_number||'')+'</b><div class="muted">'+esc(fmtDate(o.created_at))+'</div></td>'+
        '<td><div class="lead-name">'+esc(o.contact_name||'')+'</div><div class="lead-contact"><a href="mailto:'+esc(o.contact_email||'')+'">'+esc(o.contact_email||'')+'</a></div>'+(o.company?'<div class="muted">'+esc(o.company)+'</div>':'')+'</td>'+
        '<td>'+items+'</td>'+
        '<td><span class="pill p-'+esc(o.status)+'">'+esc(o.status.replace(/_/g,' '))+'</span></td>'+
        '<td><button class="btn-sm btn-ghost o-open" data-id="'+o.id+'">'+(openOrder===o.id?'Close':'Manage')+'</button></td>'+
        '</tr>';
      if (openOrder===o.id){
        html += '<tr><td colspan="5"><div class="odetail" id="odetail">'+orderDetail(o)+'</div></td></tr>';
      }
    });
    html += '</tbody></table>';
    document.getElementById('ordersWrap').innerHTML = html;
    document.querySelectorAll('.o-open').forEach(function(b){
      b.addEventListener('click', function(){ openOrder = (openOrder===b.dataset.id)?null:b.dataset.id; renderOrders(); if(openOrder) loadEvents(openOrder); });
    });
    bindDetail();
    if (openOrder) loadEvents(openOrder);
  }

  function getTokenLinks(o){
    var links = [];
    (o.order_items||[]).forEach(function(i){
      var p = latestProof(i);
      if (p && p.approval_token && p.status==='sent')
        links.push({desc:i.description, link: PROOF_BASE + '?t=' + p.approval_token});
    });
    return links;
  }

  function orderDetail(o){
    var h = '', tokenLinks = [];
    (o.order_items||[]).forEach(function(i){
      var p = latestProof(i);
      h += '<div class="oitem" data-item="'+i.id+'">'+
        '<div class="oitem-head"><b>#'+i.item_no+' '+esc(i.description)+'</b>'+
        '<span>×'+i.qty+' · '+money(i.price_inc_cents)+' inc · <span class="pill p-'+esc(i.status)+'">'+esc(i.status.replace(/_/g,' '))+'</span></span></div>';
      if (p){
        h += '<div class="proofrow">Latest proof: v'+p.version+' <span class="pill p-'+esc(p.status)+'">'+esc(p.status)+'</span>'+
          (p.sent_at?' <span class="muted">sent '+esc(fmtDate(p.sent_at))+'</span>':'')+
          (p.decided_at?' <span class="muted">decided '+esc(fmtDate(p.decided_at))+(p.approver_name?' by '+esc(p.approver_name):'')+'</span>':'')+
          (p.decision_comments?'<div class="muted" style="width:100%">Customer: “'+esc(p.decision_comments)+'”</div>':'')+
          '</div>';
        if (p.approval_token){
          var link = PROOF_BASE + '?t=' + p.approval_token;
          if (p.status==='sent') tokenLinks.push({desc:i.description, link:link});
          h += '<div class="proofrow"><b>One-click approval link'+(p.status!=='sent'?' (v'+p.version+', '+esc(p.status)+')':'')+':</b> '+
            '<a class="plink" href="'+esc(link)+'" target="_blank" rel="noopener">open ↗</a> '+
            '<button class="btn-sm btn-ghost copy-link" data-link="'+esc(link)+'">Copy link</button></div>';
        }
      }
      h += '<div class="proofrow">'+
        '<input type="file" accept="application/pdf" class="proof-file" data-item="'+i.id+'">'+
        '<button class="btn-sm btn-aura2 proof-send" data-item="'+i.id+'" data-order="'+o.id+'">Upload &amp; send proof</button>'+
        '<span class="muted proof-msg" data-item="'+i.id+'"></span>'+
        '</div>';
      h += '<div class="proofrow muted">The PDF you upload should include the trim line and 3&nbsp;mm bleed guides — that exact file is what the customer approves. Anyone with the link can approve (they must type their name), so it\'s safe to forward.</div>';
      h += '</div>';
    });
    if (tokenLinks.length){
      h += '<div class="proofrow" style="margin-top:12px">'+
        '<button class="btn-sm btn-aura2 send-mail" data-kind="proof" data-order="'+o.id+'">📨 Send proof email</button>'+
        '<a class="btn-sm btn-ghost" href="'+mailtoHref(o, tokenLinks)+'">✉ Compose instead</a>'+
        '<span class="muted send-msg" data-order="'+o.id+'" data-kind="proof"></span>'+
        '</div>';
    }

    /* invoices & payments */
    (o.invoices||[]).forEach(function(v){
      var paidCents = (o.payments||[]).filter(function(pm){return pm.status==='succeeded';})
        .reduce(function(s,pm){return s+pm.amount_cents;},0);
      var owing = v.total_inc_cents - paidCents;
      h += '<div class="oitem" style="margin-top:12px">'+
        '<div class="oitem-head"><b>🧾 '+esc(v.invoice_number)+'</b>'+
        '<span>'+money(v.total_inc_cents)+' inc · <span class="pill p-'+esc(v.status)+'">'+esc(v.status)+'</span></span></div>';
      var invUrl = PROOF_BASE.replace(/proof\.html$/,'invoice.html') + '?t=' + v.access_token;
      h += '<div class="proofrow"><a class="plink" href="'+esc(invUrl)+'" target="_blank" rel="noopener">View tax invoice ↗</a> '+
        '<button class="btn-sm btn-ghost copy-link" data-link="'+esc(invUrl)+'">Copy link</button></div>';
      if (v.payment_link_url){
        h += '<div class="proofrow"><a class="plink" href="'+esc(v.payment_link_url)+'" target="_blank" rel="noopener">Stripe payment link ↗</a> '+
          '<button class="btn-sm btn-ghost copy-link" data-link="'+esc(v.payment_link_url)+'">Copy</button> '+
          '<button class="btn-sm btn-aura2 send-mail" data-kind="invoice" data-order="'+o.id+'" data-inv="'+v.id+'">📨 Send invoice email</button> '+
          '<a class="btn-sm btn-ghost" href="'+invoiceMailtoHref(o, v, invUrl)+'">✉ Compose instead</a>'+
          '<span class="muted send-msg" data-order="'+o.id+'" data-kind="invoice"></span></div>';
      } else if (v.status==='issued'){
        h += '<div class="proofrow">'+
          '<button class="btn-sm btn-aura2 make-link" data-inv="'+v.id+'">Create Stripe payment link</button>'+
          '<span class="muted link-msg" data-inv="'+v.id+'"></span></div>';
      }
      if (paidCents>0) h += '<div class="proofrow muted">Paid so far: '+money(paidCents)+(owing>0?' · owing '+money(owing):'')+'</div>';
      if (owing>0 && v.status!=='void'){
        h += '<div class="proofrow">'+
          '<select class="status-sel pay-provider" data-inv="'+v.id+'"><option value="bank">bank transfer</option><option value="manual">manual/other</option><option value="stripe">card (stripe)</option></select>'+
          '<input type="text" class="pay-amount" data-inv="'+v.id+'" value="'+(owing/100).toFixed(2)+'" style="width:100px;padding:6px 8px;border:2px solid #e0d9d0;border-radius:8px">'+
          '<button class="btn-sm btn-aura2 pay-record" data-inv="'+v.id+'" data-order="'+o.id+'">Record payment</button>'+
          '<span class="muted pay-msg" data-inv="'+v.id+'"></span></div>';
      } else if (owing<=0){
        h += '<div class="proofrow ok">✓ Fully paid'+(v.paid_at?' '+esc(fmtDate(v.paid_at)):'')+'</div>';
      }
      h += '</div>';
    });

    /* dispatch & tracking */
    h += '<div class="oitem" style="margin-top:12px"><div class="oitem-head"><b>🚚 Dispatch</b>'+
      (o.dispatched_at?'<span class="pill p-approved">dispatched '+esc(fmtDate(o.dispatched_at))+'</span>':'<span class="pill">not dispatched</span>')+'</div>';
    if (o.tracking_number){
      h += '<div class="proofrow">'+esc(o.tracking_carrier||'Courier')+': <b>'+esc(o.tracking_number)+'</b> '+
        (o.tracking_url?'<a class="plink" href="'+esc(o.tracking_url)+'" target="_blank" rel="noopener">track ↗</a> ':'')+
        '<button class="btn-sm btn-aura2 send-mail" data-kind="dispatch" data-order="'+o.id+'">📨 Send tracking email</button> '+
        '<a class="btn-sm btn-ghost" href="'+dispatchMailtoHref(o)+'">✉ Compose instead</a>'+
        '<span class="muted send-msg" data-order="'+o.id+'" data-kind="dispatch"></span></div>';
    } else {
      h += '<div class="proofrow">'+
        '<input type="text" class="dis-carrier" data-order="'+o.id+'" placeholder="Carrier e.g. ARAMEX" style="width:130px;padding:6px 8px;border:2px solid #e0d9d0;border-radius:8px">'+
        '<input type="text" class="dis-track" data-order="'+o.id+'" placeholder="Tracking / connote no." style="width:170px;padding:6px 8px;border:2px solid #e0d9d0;border-radius:8px">'+
        '<input type="text" class="dis-url" data-order="'+o.id+'" placeholder="Tracking URL (optional)" style="width:200px;padding:6px 8px;border:2px solid #e0d9d0;border-radius:8px">'+
        '<button class="btn-sm btn-aura2 dis-save" data-order="'+o.id+'">Mark dispatched</button>'+
        '<span class="muted dis-msg" data-order="'+o.id+'"></span></div>'+
        '<div class="proofrow muted">Tip: supplier dispatch emails are also picked up automatically by the daily inbox scan when the job name contains the AP number.</div>';
    }
    h += '</div>';

    h += '<div class="events" id="events-'+o.id+'">Loading history…</div>';
    return h;
  }

  function dispatchEmailContent(o){
    var first = (o.contact_name||'').split(' ')[0] || 'there';
    var subj = 'Your order '+(o.order_number||'')+' is on its way — Aura Print & Promo';
    var body =
      'Hi '+first+',\n\n'+
      'Great news — your order '+(o.order_number||'')+' has been dispatched!\n\n'+
      'Carrier: '+(o.tracking_carrier||'Courier')+'\n'+
      'Tracking number: '+(o.tracking_number||'')+'\n'+
      (o.tracking_url?('Track it here: '+o.tracking_url+'\n'):'')+'\n'+
      'Please note it can take 12–24 hours for the courier to register the consignment in their system, so don\'t worry if tracking shows nothing just yet.\n\n'+
      'Thanks again for printing with us — we\'d love to help with your next job too.\n\n'+
      'Kind regards,\n'+
      'Murray\n'+
      'Aura Print & Promo\n'+
      'e: admin@auraprint.com.au\n'+
      'w: auraprint.com.au';
    return { subject: subj, body: body };
  }
  function dispatchMailtoHref(o){
    var c = dispatchEmailContent(o);
    return 'mailto:'+encodeURIComponent(o.contact_email||'')+'?subject='+encodeURIComponent(c.subject)+'&body='+encodeURIComponent(c.body);
  }

  async function markDispatched(orderId, btn){
    var g = function(cls){ return (document.querySelector('.'+cls+'[data-order="'+orderId+'"]')||{}).value||''; };
    var msg = document.querySelector('.dis-msg[data-order="'+orderId+'"]');
    var track = g('dis-track').trim();
    if (!track){ msg.textContent = 'Enter the tracking number.'; return; }
    btn.disabled = true; msg.textContent = 'Saving…';
    var res = await sb.from('orders').update({
      tracking_carrier: g('dis-carrier').trim()||null,
      tracking_number: track,
      tracking_url: g('dis-url').trim()||null,
      dispatched_at: new Date().toISOString(),
      status: 'shipped'
    }).eq('id', orderId);
    btn.disabled = false;
    if (res.error){ msg.textContent = 'Failed: '+res.error.message; return; }
    await loadOrders();
  }

  function proofEmailContent(o, tokenLinks){
    var first = (o.contact_name||'').split(' ')[0] || 'there';
    var num = o.order_number||'';
    var subj = 'Please proof your order '+num+' — Aura Print & Promo';
    var linkBlock = tokenLinks.length===1
      ? 'Click here to proof order '+num+':\n'+tokenLinks[0].link
      : 'Click below to proof each item in order '+num+':\n\n'+
        tokenLinks.map(function(l){ return '• '+l.desc+':\n  '+l.link; }).join('\n\n');
    var body =
      'Hi '+first+',\n\n'+
      'It\'s time to confirm that your artwork looks just how you want it so we can get it into production. Please read the following carefully to avoid any delays in processing your order.\n\n'+
      'More than anything, we want you to be thrilled with the finished product, so please take this proofing seriously and check for spelling or any errors that may have crept in during the processing of your files. You will receive exactly what you approve here — if there is a typo, you will be the proud owner of printing with a typo, and no one wants that. We cannot be held liable for costs incurred to replace items due to insufficient checks of the artwork proof.\n\n'+
      'On your proof, the solid line is the trim line (finished size) and the 3mm beyond it is bleed, which is trimmed away. Please check nothing important sits outside the trim line.\n\n'+
      linkBlock+'\n\n'+
      'No sign-in needed — the link opens your proof directly, and you can forward this email to a colleague if someone else needs to approve it. Please make all approvals and change requests on the proofing page (it notifies us instantly); there is no need to reply to this email.\n\n'+
      'Nothing goes to print until you approve.\n\n'+
      'Kind regards,\n'+
      'Murray\n'+
      'Aura Print & Promo\n'+
      'e: admin@auraprint.com.au\n'+
      'w: auraprint.com.au';
    return { subject: subj, body: body };
  }
  function mailtoHref(o, tokenLinks){
    var c = proofEmailContent(o, tokenLinks);
    return 'mailto:'+encodeURIComponent(o.contact_email||'')+'?subject='+encodeURIComponent(c.subject)+'&body='+encodeURIComponent(c.body);
  }

  async function loadEvents(orderId){
    var res = await sb.from('order_events').select('created_at,event,detail').eq('order_id',orderId).order('created_at',{ascending:false}).limit(30);
    var el = document.getElementById('events-'+orderId);
    if (!el) return;
    if (res.error){ el.textContent = 'History unavailable: '+res.error.message; return; }
    el.innerHTML = (res.data||[]).map(function(e){
      return '<div>'+esc(fmtDate(e.created_at))+' — '+esc(e.event.replace(/_/g,' '))+'</div>';
    }).join('') || 'No events yet.';
  }

  function bindDetail(){
    document.querySelectorAll('.proof-send').forEach(function(b){
      b.addEventListener('click', function(){ sendProof(b.dataset.order, b.dataset.item, b); });
    });
    document.querySelectorAll('.copy-link').forEach(function(b){
      b.addEventListener('click', function(){
        navigator.clipboard.writeText(b.dataset.link).then(function(){
          b.textContent = 'Copied ✓'; setTimeout(function(){ b.textContent='Copy link'; }, 1500);
        });
      });
    });
    document.querySelectorAll('.pay-record').forEach(function(b){
      b.addEventListener('click', function(){ recordPayment(b.dataset.order, b.dataset.inv, b); });
    });
    document.querySelectorAll('.make-link').forEach(function(b){
      b.addEventListener('click', function(){ createPaymentLink(b.dataset.inv, b); });
    });
    document.querySelectorAll('.dis-save').forEach(function(b){
      b.addEventListener('click', function(){ markDispatched(b.dataset.order, b); });
    });
    document.querySelectorAll('.send-mail').forEach(function(b){
      b.addEventListener('click', function(){ sendCrmEmail(b.dataset.kind, b.dataset.order, b.dataset.inv, b); });
    });
  }

  async function sendCrmEmail(kind, orderId, invoiceId, btn){
    var o = allOrders.find(function(x){return x.id===orderId;}); if(!o) return;
    var msg = document.querySelector('.send-msg[data-order="'+orderId+'"][data-kind="'+kind+'"]');
    var c;
    if (kind==='proof'){ c = proofEmailContent(o, getTokenLinks(o)); }
    else if (kind==='dispatch'){ c = dispatchEmailContent(o); }
    else if (kind==='invoice'){
      var v = (o.invoices||[]).find(function(x){return x.id===invoiceId;}); if(!v) return;
      var invUrl = PROOF_BASE.replace(/proof\.html$/,'invoice.html') + '?t=' + v.access_token;
      c = invoiceEmailContent(o, v, invUrl);
    } else return;
    if (!confirm('Send this email to '+(o.contact_email||'')+' now?\n\nSubject: '+c.subject)) return;
    btn.disabled = true; if (msg) msg.textContent = 'Sending…';
    try {
      var s = await sb.auth.getSession();
      var r = await fetch(CFG.supabaseUrl+'/functions/v1/send-email', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+s.data.session.access_token },
        body: JSON.stringify({ to: o.contact_email, subject: c.subject, text: c.body, order_id: o.id })
      });
      var j = await r.json();
      if (!r.ok || !j.ok){ if (msg) msg.textContent = (j.error||('HTTP '+r.status)); btn.disabled=false; return; }
      if (msg) msg.textContent = 'Sent ✓';
      btn.disabled = false;
    } catch(e){
      if (msg) msg.textContent = 'Failed: '+(e.message||e);
      btn.disabled = false;
    }
  }

  async function createPaymentLink(invoiceId, btn){
    var msg = document.querySelector('.link-msg[data-inv="'+invoiceId+'"]');
    btn.disabled = true; msg.textContent = 'Creating…';
    try {
      var s = await sb.auth.getSession();
      var r = await fetch(CFG.supabaseUrl+'/functions/v1/stripe-payment-link', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+s.data.session.access_token },
        body: JSON.stringify({ invoice_id: invoiceId })
      });
      var j = await r.json();
      if (!r.ok || !j.url){ msg.textContent = 'Failed: '+(j.error||('HTTP '+r.status)); btn.disabled=false; return; }
      msg.textContent = 'Link created ✓';
      await loadOrders();
    } catch(e){
      msg.textContent = 'Failed: '+(e.message||e); btn.disabled = false;
    }
  }

  function invoiceEmailContent(o, v, invUrl){
    var first = (o.contact_name||'').split(' ')[0] || 'there';
    var subj = 'Tax invoice '+(v.invoice_number||'')+' — order '+(o.order_number||'')+' — Aura Print & Promo';
    var body =
      'Hi '+first+',\n\n'+
      'Thank you for completing our online approval process! Your order '+(o.order_number||'')+' is queued for production — please note full payment is required before production begins.\n\n'+
      'View your tax invoice online ('+money(v.total_inc_cents)+' inc GST):\n'+invUrl+'\n\n'+
      'To pay by credit or debit card, click the green ‘View & Pay Online’ button on the invoice — payment is processed securely by Stripe and your job is released automatically.\n\n'+
      'EFT details are also on the invoice; please use your invoice number as the payment reference. Bank transfers can take up to 1 business day for us to receive — if your job is urgent, email your remittance advice to admin@auraprint.com.au and we\'ll release it early.\n\n'+
      'Once your order is dispatched we\'ll email you with tracking details.\n\n'+
      'We look forward to working with you again.\n\n'+
      'Kind regards,\n'+
      'Murray\n'+
      'Aura Print & Promo\n'+
      'e: admin@auraprint.com.au\n'+
      'w: auraprint.com.au';
    return { subject: subj, body: body };
  }
  function invoiceMailtoHref(o, v, invUrl){
    var c = invoiceEmailContent(o, v, invUrl);
    return 'mailto:'+encodeURIComponent(o.contact_email||'')+'?subject='+encodeURIComponent(c.subject)+'&body='+encodeURIComponent(c.body);
  }

  async function recordPayment(orderId, invoiceId, btn){
    var msg = document.querySelector('.pay-msg[data-inv="'+invoiceId+'"]');
    var provider = document.querySelector('.pay-provider[data-inv="'+invoiceId+'"]').value;
    var amount = Math.round(parseFloat(document.querySelector('.pay-amount[data-inv="'+invoiceId+'"]').value||'0')*100);
    if (!(amount>0)){ msg.textContent = 'Enter a valid amount.'; return; }
    if (!confirm('Record a '+provider+' payment of $'+(amount/100).toFixed(2)+' against this invoice?')) return;
    btn.disabled = true; msg.textContent = 'Recording…';
    var res = await sb.from('payments').insert({
      invoice_id: invoiceId, order_id: orderId, amount_cents: amount,
      provider: provider, status: 'succeeded', paid_at: new Date().toISOString()
    });
    btn.disabled = false;
    if (res.error){ msg.textContent = 'Failed: '+res.error.message; return; }
    msg.textContent = 'Recorded ✓';
    await loadOrders();
  }

  async function sendProof(orderId, itemId, btn){
    var msg = document.querySelector('.proof-msg[data-item="'+itemId+'"]');
    var fileEl = document.querySelector('.proof-file[data-item="'+itemId+'"]');
    var f = fileEl && fileEl.files && fileEl.files[0];
    if (!f){ msg.textContent = 'Choose a PDF first.'; return; }
    if (f.type !== 'application/pdf'){ msg.textContent = 'Proofs must be PDF.'; return; }
    if (f.size > 50*1024*1024){ msg.textContent = 'Max 50 MB.'; return; }
    btn.disabled = true; msg.textContent = 'Uploading…';
    try {
      var o = allOrders.find(function(x){return x.id===orderId;});
      var item = (o.order_items||[]).find(function(x){return x.id===itemId;});
      var nextV = ((latestProof(item)||{}).version||0)+1;
      var path = 'orders/'+orderId+'/proof-item'+item.item_no+'-v'+nextV+'-'+Date.now()+'.pdf';
      var up = await sb.storage.from('artwork').upload(path, f, {contentType:'application/pdf'});
      if (up.error) throw up.error;
      var u = await sb.auth.getUser();
      var fr = await sb.from('order_files').insert({
        order_id: orderId, order_item_id: itemId, kind:'proof',
        filename: f.name, mime_type:'application/pdf', size_bytes: f.size,
        storage_path: path, uploaded_by: u.data.user.id
      }).select('id').single();
      if (fr.error) throw fr.error;
      msg.textContent = 'Sending…';
      var pr = await sb.from('proofs').insert({ order_item_id: itemId, file_id: fr.data.id }).select('id,version').single();
      if (pr.error) throw pr.error;
      msg.textContent = 'Proof v'+pr.data.version+' sent ✓ — now email the customer their link.';
      await loadOrders();
    } catch(e){
      msg.textContent = 'Failed: '+(e.message||e);
    }
    btn.disabled = false;
  }

  document.getElementById('oCreate').addEventListener('click', async function(){
    var m = document.getElementById('oMsg');
    var name = document.getElementById('oName').value.trim();
    var email = document.getElementById('oEmail').value.trim();
    var desc = document.getElementById('oDesc').value.trim();
    var qty = parseInt(document.getElementById('oQty').value,10);
    var price = Math.round(parseFloat(document.getElementById('oPrice').value||'0')*100);
    if (!name || !email || !desc || !(qty>0) || !(price>=0) || isNaN(price)){ m.textContent='Fill in name, email, description, qty and price.'; return; }
    this.disabled = true; m.textContent = 'Creating…';
    try {
      var or_ = await sb.from('orders').insert({
        contact_name:name, contact_email:email,
        contact_phone:document.getElementById('oPhone').value.trim()||null,
        company:document.getElementById('oCompany').value.trim()||null,
        notes:document.getElementById('oNotes').value.trim()||null
      }).select('id,order_number').single();
      if (or_.error) throw or_.error;
      var it = await sb.from('order_items').insert({
        order_id: or_.data.id, item_no:1, description:desc, qty:qty,
        product_slug: (document.getElementById('oSlug').value.trim()||'custom'),
        pricing_mode:'quoted', price_source:'staff_quote',
        price_inc_cents:price,
        status:'awaiting_artwork'
      });
      if (it.error) throw it.error;
      /* orders always start as draft; move to submitted now items exist */
      var st = await sb.from('orders').update({status:'submitted'}).eq('id', or_.data.id);
      if (st.error) throw st.error;
      m.textContent = 'Created '+or_.data.order_number+' ✓';
      ['oName','oEmail','oPhone','oCompany','oDesc','oNotes','oPrice'].forEach(function(id){ document.getElementById(id).value=''; });
      document.getElementById('oQty').value = 1;
      openOrder = or_.data.id;
      await loadOrders();
    } catch(e){ m.textContent = 'Failed: '+(e.message||e); }
    this.disabled = false;
  });

  /* ============ AUTH ============ */
  document.getElementById('lBtn').addEventListener('click', signIn);
  document.getElementById('lPass').addEventListener('keydown', function(e){ if(e.key==='Enter') signIn(); });
  async function signIn(){
    var email = document.getElementById('lEmail').value.trim();
    var pass = document.getElementById('lPass').value;
    var err = document.getElementById('lErr'); err.textContent='';
    var token = (window.hcaptcha && hcaptcha.getResponse()) || '';
    if (!token){ err.textContent = 'Please tick the captcha box first.'; return; }
    var btn = document.getElementById('lBtn'); btn.disabled=true; btn.textContent='Signing in…';
    var res = await sb.auth.signInWithPassword({ email:email, password:pass, options:{ captchaToken:token } });
    btn.disabled=false; btn.textContent='Sign in';
    if (res.error){ err.textContent = res.error.message; if (window.hcaptcha) hcaptcha.reset(); return; }
    showApp();
  }
  document.getElementById('signout').addEventListener('click', async function(){ await sb.auth.signOut(); showLogin(); });

  sb.auth.getSession().then(function(r){ if (r.data.session) showApp(); else showLogin(); });
})();
</script>
</body>
</html>
